<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - NASHTY OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: #0B0F19; color: #F8FAFC; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 32px; font-weight: 900; color: #FF5A1F; margin-bottom: 24px; }
    .actions { margin-bottom: 20px; }
    .btn { background: #FF5A1F; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-right: 10px; }
    .btn:hover { background: #E04812; }
    .btn-secondary { background: #374151; }
    .btn-secondary:hover { background: #4B5563; }
    table { width: 100%; background: rgba(21, 29, 45, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; overflow: hidden; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
    th { background: rgba(30, 41, 59, 0.85); font-weight: 700; color: #CBD5E1; }
    .badge { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-active { background: rgba(16, 185, 129, 0.15); color: #10B981; }
    .badge-inactive { background: rgba(244, 63, 94, 0.15); color: #F43F5E; }
    .badge-superadmin { background: rgba(168, 85, 247, 0.15); color: #8B5CF6; }
    .badge-admin { background: rgba(59, 130, 246, 0.15); color: #3B82F6; }
    .system-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .system-chip { padding: 4px 8px; border-radius: 6px; font-size: 10px; background: rgba(255, 90, 31, 0.15); color: #FF5A1F; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(21, 29, 45, 0.95); border: 2px solid #FF5A1F; border-radius: 20px; padding: 32px; max-width: 600px; width: 90%; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #CBD5E1; margin-bottom: 8px; }
    input, select { width: 100%; background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 10px 12px; color: #F8FAFC; font-size: 13px; }
    .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(30, 41, 59, 0.5); border-radius: 6px; }
    input[type="checkbox"] { width: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>👥 User Management</h1>
    <p style="color: #94A3B8; margin-bottom: 24px;">Manage users and their system access</p>

    <div class="actions">
      <button class="btn" onclick="openAddModal()">➕ Add New User</button>
      <button class="btn-secondary btn" onclick="loadUsers()">🔄 Refresh</button>
    </div>

    <table id="usersTable">
      <thead>
        <tr>
          <th>Username</th>
          <th>Full Name</th>
          <th>Role</th>
          <th>System Access</th>
          <th>Status</th>
          <th>Last Login</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="7" style="text-align: center; padding: 40px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Add/Edit User Modal -->
  <div class="modal" id="userModal">
    <div class="modal-content">
      <h2 style="margin-bottom: 20px;">Add/Edit User</h2>
      <form id="userForm" onsubmit="saveUser(event)">
        <input type="hidden" id="userId">
        
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="username" required>
        </div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>

        <div class="form-group">
          <label>Password * (leave blank to keep current)</label>
          <input type="password" id="password">
        </div>

        <div class="form-group">
          <label>Role *</label>
          <select id="role" required>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="cashier">Cashier</option>
            <option value="owner">Owner</option>
            <option value="superadmin">Superadmin</option>
          </select>
        </div>

        <div class="form-group">
          <label>System Access</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="systems" value="pos"> POS
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="systems" value="kds"> KDS
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="systems" value="backoffice"> Backoffice
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="systems" value="crm"> CRM
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="systems" value="cost"> Cost
            </label>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <button type="submit" class="btn">💾 Save</button>
          <button type="button" class="btn-secondary btn" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let users = [];

    async function loadUsers() {
      try {
        const response = await fetch('/api/users', {
          headers: {
            'Authorization': `Bearer ${window.NASHTY_AUTH.getToken()}`
          }
        });
        const data = await response.json();
        users = data.users || [];
        renderUsers();
      } catch (e) {
        alert('Failed to load users');
      }
    }

    function renderUsers() {
      const tbody = document.getElementById('usersTableBody');
      
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => `
        <tr>
          <td><strong>${user.username}</strong></td>
          <td>${user.full_name || '-'}</td>
          <td><span class="badge badge-${user.role}">${user.role}</span></td>
          <td>
            <div class="system-chips">
              ${(user.systems || []).map(s => `<span class="system-chip">${s}</span>`).join('')}
            </div>
          </td>
          <td><span class="badge badge-${user.is_active ? 'active' : 'inactive'}">${user.is_active ? 'Active' : 'Inactive'}</span></td>
          <td>${user.last_login_at ? new Date(user.last_login_at).toLocaleDateString() : 'Never'}</td>
          <td>
            <button class="btn-secondary btn" style="padding: 6px 12px; font-size: 12px;" onclick="editUser('${user.id}')">Edit</button>
            ${user.role !== 'superadmin' ? `<button class="btn-secondary btn" style="padding: 6px 12px; font-size: 12px; background: #7F1D1D;" onclick="toggleUser('${user.id}', ${!user.is_active})">${user.is_active ? 'Disable' : 'Enable'}</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    function openAddModal() {
      document.getElementById('userForm').reset();
      document.getElementById('userId').value = '';
      document.getElementById('userModal').classList.add('show');
    }

    function editUser(userId) {
      const user = users.find(u => u.id === userId);
      if (!user) return;

      document.getElementById('userId').value = user.id;
      document.getElementById('username').value = user.username;
      document.getElementById('fullName').value = user.full_name || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('password').value = '';
      document.getElementById('role').value = user.role;

      // Set system checkboxes
      document.querySelectorAll('input[name="systems"]').forEach(cb => {
        cb.checked = (user.systems || []).includes(cb.value);
      });

      document.getElementById('userModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('userModal').classList.remove('show');
    }

    async function saveUser(event) {
      event.preventDefault();

      const userId = document.getElementById('userId').value;
      const systems = Array.from(document.querySelectorAll('input[name="systems"]:checked')).map(cb => cb.value);

      const userData = {
        username: document.getElementById('username').value,
        full_name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
        systems
      };

      try {
        const url = userId ? `/api/users/${userId}` : '/api/users';
        const method = userId ? 'PUT' : 'POST';

        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${window.NASHTY_AUTH.getToken()}`
          },
          body: JSON.stringify(userData)
        });

        const data = await response.json();

        if (data.success) {
          alert('User saved successfully!');
          closeModal();
          loadUsers();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (e) {
        alert('Failed to save user');
      }
    }

    async function toggleUser(userId, enable) {
      if (!confirm(`Are you sure you want to ${enable ? 'enable' : 'disable'} this user?`)) return;

      try {
        const response = await fetch(`/api/users/${userId}/toggle`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${window.NASHTY_AUTH.getToken()}`
          },
          body: JSON.stringify({ is_active: enable })
        });

        const data = await response.json();

        if (data.success) {
          loadUsers();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (e) {
        alert('Failed to toggle user');
      }
    }

    // Load users on page load
    loadUsers();
  </script>
</body>
</html>
