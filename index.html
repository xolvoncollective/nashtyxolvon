<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASHTY OS - Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .logo p {
            color: #718096;
            font-size: 14px;
        }

        .login-form {
            display: block;
        }

        .launcher-buttons {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        input[type="password"],
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .module-buttons {
            display: grid;
            gap: 12px;
        }

        .btn-module {
            padding: 20px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid #e2e8f0;
            background: white;
            color: #2d3748;
        }

        .btn-module:hover {
            border-color: currentColor;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-module .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .btn-module .content {
            flex: 1;
        }

        .btn-module .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .btn-module .description {
            font-size: 13px;
            color: #718096;
        }

        .btn-pos {
            color: #3b82f6;
        }

        .btn-pos .icon {
            background: #dbeafe;
            color: #3b82f6;
        }

        .btn-kds {
            color: #10b981;
        }

        .btn-kds .icon {
            background: #d1fae5;
            color: #10b981;
        }

        .btn-backoffice {
            color: #f59e0b;
        }

        .btn-backoffice .icon {
            background: #fef3c7;
            color: #f59e0b;
        }

        .btn-crm {
            color: #ec4899;
        }

        .btn-crm .icon {
            background: #fce7f3;
            color: #ec4899;
        }

        .btn-cost {
            color: #8b5cf6;
        }

        .btn-cost .icon {
            background: #ede9fe;
            color: #8b5cf6;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .user-info {
            text-align: center;
            padding: 16px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-info .name {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .user-info .role {
            font-size: 14px;
            color: #718096;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #f7fafc;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .logout-btn:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px;
            }

            .logo h1 {
                font-size: 28px;
            }

            .btn-module {
                padding: 16px;
            }

            .btn-module .icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>🍔 NASHTY OS</h1>
                <p>Restaurant Management System</p>
            </div>

            <!-- Login Form -->
            <div class="login-form" id="loginForm">
                <div class="error-message" id="errorMessage"></div>
                
                <form id="pinForm">
                    <div class="form-group">
                        <label for="outletSelect">Select Outlet</label>
                        <select id="outletSelect" required>
                            <option value="">Loading outlets...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pinInput">Enter PIN</label>
                        <input 
                            type="password" 
                            id="pinInput" 
                            placeholder="Enter your 4-6 digit PIN"
                            maxlength="6"
                            pattern="[0-9]{4,6}"
                            required
                            autocomplete="off"
                        >
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        Login
                    </button>
                </form>
            </div>

            <!-- Launcher Buttons (shown after login) -->
            <div class="launcher-buttons" id="launcherButtons">
                <div class="success-message" id="successMessage"></div>
                
                <div class="user-info" id="userInfo">
                    <div class="name" id="userName">User Name</div>
                    <div class="role" id="userRole">Role</div>
                </div>

                <div class="module-buttons">
                    <button class="btn btn-module btn-pos" id="openPosBtn">
                        <div class="icon">🧾</div>
                        <div class="content">
                            <div class="title">Open POS</div>
                            <div class="description">Point of Sale Terminal</div>
                        </div>
                    </button>

                    <button class="btn btn-module btn-kds" id="openKdsBtn">
                        <div class="icon">👨‍🍳</div>
                        <div class="content">
                            <div class="title">Open KDS</div>
                            <div class="description">Kitchen Display System</div>
                        </div>
                    </button>

                    <button class="btn btn-module btn-backoffice" id="openBackofficeBtn">
                        <div class="icon">⚙️</div>
                        <div class="content">
                            <div class="title">Open Backoffice</div>
                            <div class="description">Management & Reports</div>
                        </div>
                    </button>

                    <button class="btn btn-module btn-crm" id="openCrmBtn">
                        <div class="icon">👥</div>
                        <div class="content">
                            <div class="title">Open CRM</div>
                            <div class="description">Customer Relationship</div>
                        </div>
                    </button>

                    <button class="btn btn-module btn-cost" id="openCostBtn">
                        <div class="icon">💰</div>
                        <div class="content">
                            <div class="title">Open Cost</div>
                            <div class="description">Cost Management</div>
                        </div>
                    </button>
                </div>

                <button class="btn logout-btn" id="logoutBtn">
                    Logout
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:3099/api';
        
        // State
        let authToken = null;
        let currentUser = null;
        let currentOutlet = null;

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const launcherButtons = document.getElementById('launcherButtons');
        const pinForm = document.getElementById('pinForm');
        const outletSelect = document.getElementById('outletSelect');
        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userRole = document.getElementById('userRole');
        const openPosBtn = document.getElementById('openPosBtn');
        const openKdsBtn = document.getElementById('openKdsBtn');
        const openBackofficeBtn = document.getElementById('openBackofficeBtn');
        const openCrmBtn = document.getElementById('openCrmBtn');
        const openCostBtn = document.getElementById('openCostBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadOutlets();
            checkExistingSession();
        });

        // Load outlets from API
        async function loadOutlets() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/outlets`);
                if (!response.ok) throw new Error('Failed to load outlets');
                
                const data = await response.json();
                const outlets = data.outlets || [];
                
                outletSelect.innerHTML = '<option value="">Select an outlet</option>';
                outlets.forEach(outlet => {
                    const option = document.createElement('option');
                    option.value = outlet.id;
                    option.textContent = outlet.name;
                    outletSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load outlets:', error);
                outletSelect.innerHTML = '<option value="">Failed to load outlets</option>';
            }
        }

        // Check for existing session
        function checkExistingSession() {
            const token = localStorage.getItem('nashty_token');
            const user = localStorage.getItem('nashty_user');
            const outlet = localStorage.getItem('nashty_outlet');
            
            if (token && user && outlet) {
                authToken = token;
                currentUser = JSON.parse(user);
                currentOutlet = JSON.parse(outlet);
                showLauncher();
            }
        }

        // Handle login form submission
        pinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pin = pinInput.value.trim();
            const outletId = outletSelect.value;
            
            if (!outletId) {
                showError('Please select an outlet');
                return;
            }
            
            if (!pin || pin.length < 4) {
                showError('Please enter a valid PIN (4-6 digits)');
                return;
            }
            
            await login(pin, outletId);
        });

        // Login function
        async function login(pin, outletId) {
            try {
                setLoading(true);
                hideError();
                
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pin, outletId })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }
                
                // Store session data
                authToken = data.token;
                currentUser = data.user;
                currentOutlet = { id: outletId, name: outletSelect.options[outletSelect.selectedIndex].text };
                
                localStorage.setItem('nashty_token', authToken);
                localStorage.setItem('nashty_user', JSON.stringify(currentUser));
                localStorage.setItem('nashty_outlet', JSON.stringify(currentOutlet));
                
                // Show launcher
                showLauncher();
                showSuccess('Login successful! Select a module to open.');
                
            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login failed. Please check your PIN and try again.');
            } finally {
                setLoading(false);
            }
        }

        // Show launcher buttons
        function showLauncher() {
            loginForm.style.display = 'none';
            launcherButtons.style.display = 'block';
            
            if (currentUser) {
                userName.textContent = currentUser.name || currentUser.username || 'User';
                userRole.textContent = `${currentUser.role || 'Staff'} • ${currentOutlet.name}`;
            }
        }

        // Show login form
        function showLogin() {
            launcherButtons.style.display = 'none';
            loginForm.style.display = 'block';
            pinInput.value = '';
            hideError();
            hideSuccess();
        }

        // Module launchers
        openPosBtn.addEventListener('click', () => {
            openModule('/pos/frontend/', 'POS Terminal');
        });

        openKdsBtn.addEventListener('click', () => {
            openModule('/kds/frontend/', 'Kitchen Display');
        });

        openBackofficeBtn.addEventListener('click', () => {
            openModule('/backoffice/frontend/', 'Backoffice');
        });

        openCrmBtn.addEventListener('click', () => {
            openModule('/crm/', 'CRM');
        });

        openCostBtn.addEventListener('click', () => {
            openModule('/cost/', 'Cost');
        });

        // Open module in new window
        function openModule(path, title) {
            const url = `http://localhost:3099${path}`;
            const windowFeatures = 'width=1280,height=800,menubar=no,toolbar=no,location=no,status=no';
            const newWindow = window.open(url, title, windowFeatures);
            
            if (newWindow) {
                // Send auth token to child window via postMessage
                // This will be implemented in Task 6.2
                setTimeout(() => {
                    try {
                        newWindow.postMessage({
                            type: 'NASHTY_AUTH',
                            token: authToken,
                            user: currentUser,
                            outlet: currentOutlet
                        }, 'http://localhost:3099');
                    } catch (error) {
                        console.error('Failed to send auth to child window:', error);
                    }
                }, 1000);
            } else {
                showError('Failed to open window. Please allow pop-ups for this site.');
            }
        }

        // Logout
        logoutBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to logout?')) {
                logout();
            }
        });

        function logout() {
            // Clear session data
            authToken = null;
            currentUser = null;
            currentOutlet = null;
            
            localStorage.removeItem('nashty_token');
            localStorage.removeItem('nashty_user');
            localStorage.removeItem('nashty_outlet');
            
            showLogin();
        }

        // UI Helper functions
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => hideSuccess(), 3000);
        }

        function hideSuccess() {
            successMessage.style.display = 'none';
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            if (loading) {
                loginBtn.innerHTML = 'Logging in<span class="loading"></span>';
            } else {
                loginBtn.textContent = 'Login';
            }
        }

        // Auto-focus PIN input
        pinInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
