version: "2"
type: backend
tech_stack:
  - TypeScript
  - Express.js
  - SQLite (better-sqlite3)
  - Zod
features:
  - name: Authentication API
    description: Login, verifying PINs, and getting list of staff/outlets
    files:
      - backoffice/backend/src/routes/auth.ts
    endpoints:
      - method: GET
        path: /api/auth/staff/:outletId
        description: List active cashiers for login screen
        auth_required: false
      - method: POST
        path: /api/auth/login
        description: Verify cashier PIN via bcryptjs
        auth_required: false
      - method: POST
        path: /api/auth/verify-manager-pin
        description: Verify Manager PIN for void/large discount
        auth_required: false
      - method: GET
        path: /api/auth/outlets
        description: List all active outlets
        auth_required: false
  - name: Menu API
    description: Fetch menu categories, items, and modifiers
    files:
      - backoffice/backend/src/routes/categories.ts
      - backoffice/backend/src/routes/products.ts
    endpoints:
      - method: GET
        path: /api/menu/outlet/:outletId
        description: All categories, items, and modifier groups per outlet
        auth_required: false
  - name: Orders API
    description: Manage orders and order status
    files:
      - backoffice/backend/src/routes/orders.ts
    endpoints:
      - method: POST
        path: /api/orders
        description: Create new order
        auth_required: false
      - method: GET
        path: /api/orders
        description: List orders with outletId and kitchenStatus filters
        auth_required: false
      - method: GET
        path: /api/orders/shift/:shiftId
        description: Order history per shift
        auth_required: false
      - method: GET
        path: /api/orders/config/:outletId
        description: POS config, service charge, payment methods
        auth_required: false
      - method: PATCH
        path: /api/orders/:id/status
        description: Update order status or item status
        auth_required: false
      - method: PUT
        path: /api/orders/:id/void
        description: Void order
        auth_required: false
  - name: Shifts API
    description: Open, close and summarize shifts
    files:
      - backoffice/backend/src/routes/shifts.ts
    endpoints:
      - method: GET
        path: /api/shifts/active/:outletId
        description: Check active shift
        auth_required: false
      - method: POST
        path: /api/shifts
        description: Open new shift
        auth_required: false
      - method: PUT
        path: /api/shifts/:id/close
        description: Close shift and generate summary
        auth_required: false
      - method: GET
        path: /api/shifts/:id/summary
        description: Shift summary
        auth_required: false
  - name: Dashboard API
    description: KPI and recent orders
    files:
      - backoffice/backend/src/routes/dashboard.ts
    endpoints:
      - method: GET
        path: /api/dashboard/kpi
        description: Daily KPI revenue and transactions
        auth_required: false
      - method: GET
        path: /api/dashboard/recent-orders
        description: N recent transactions
        auth_required: false
known_limitations: []
