<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NASHTY OS — KDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="shell">

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="tb-logo">N</div>
  <div>
    <div class="tb-brand">NASHTY OS</div>
    <div class="tb-sub">Kitchen Display</div>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-station">Dapur Utama</div>
  <div class="tb-sep"></div>
  <div class="live-pill"><div class="live-dot"></div><span class="live-txt">Live</span></div>

  <!-- Queue Summary: Orders · Items · Urgent -->
  <div class="queue-summary" id="queue-summary">
    <div class="qs-item" id="qs-orders">
      <div class="qs-n" id="qs-orders-n">0</div>
      <div class="qs-lbl">Orders</div>
    </div>
    <div class="qs-item" id="qs-items">
      <div class="qs-n" id="qs-items-n">0</div>
      <div class="qs-lbl">Items</div>
    </div>
    <div class="qs-item urgent" id="qs-urgent">
      <div class="qs-n" id="qs-urgent-n">0</div>
      <div class="qs-lbl">Urgent</div>
    </div>
  </div>

  <div class="tb-right">
    <div class="tb-clock" id="kds-clock">00:00:00</div>
    <div class="tb-btn" id="mode-btn" onclick="toggleMode()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      Day
    </div>
    <div class="tb-btn" onclick="addDemoOrder()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Order
    </div>
  </div>
</header>

<!-- ── URGENT STICKY STRIP ── -->
<div class="urgent-strip" id="urgent-strip">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  <span class="ust-lbl">URGENT</span>
  <div class="ust-orders" id="ust-orders"></div>
</div>

<!-- ── FILTER BAR ── -->
<div class="filterbar">
  <button class="flt act" onclick="setFilter('all',this)">Semua</button>
  <button class="flt" onclick="setFilter('dine',this)">Dine In</button>
  <button class="flt" onclick="setFilter('take',this)">Take Away</button>
  <button class="flt" onclick="setFilter('delivery',this)">Delivery</button>
  <button class="flt danger" id="flt-urgent" onclick="setFilter('urgent',this)">⚠ Urgent</button>
  <div class="flt-sep"></div>
  <div class="sort-info">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
    Auto-sort: Urgent → Warning → Fresh
  </div>
</div>

<!-- ── ORDER GRID ── -->
<div class="kds-grid" id="kds-grid"></div>

<!-- ── POS NOTIFICATION OVERLAY ── -->
<div class="pos-notify-overlay" id="pos-notify">
  <div class="pos-notify-box">
    <div class="pn-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="pn-title">Pesanan Selesai!</div>
    <div class="pn-order" id="pn-order-no">—</div>
    <div class="pn-sub" id="pn-sub">Meja T03 · Dine In</div>
    <div class="pn-items" id="pn-items"></div>
    <div class="pn-warn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Konfirmasi ke pelanggan sebelum klik selesai
    </div>
    <button class="pn-confirm" id="pn-confirm-btn">
      ✓ Pesanan Sudah Diserahkan ke Pelanggan
    </button>
  </div>
</div>

<script src="../../api-client-v2.js?v=6"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/timer.js"></script>
<script src="js/render.js"></script>
<script src="js/interactions.js"></script>
<script src="js/app.js"></script>
</body>
</html>
