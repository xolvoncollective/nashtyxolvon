<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASHTY OS - Main Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 40px;
      font-weight: bold;
      color: white;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: 800;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }
    
    input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error {
      color: #e74c3c;
      margin-top: 15px;
      text-align: center;
      padding: 12px;
      background: #fee;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .success {
      color: #27ae60;
      margin-top: 15px;
      text-align: center;
      padding: 12px;
      background: #efe;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .success.show {
      display: block;
    }
    
    .apps {
      display: none;
    }
    
    .apps.show {
      display: block;
    }
    
    .apps h2 {
      color: #333;
      margin-bottom: 25px;
      text-align: center;
      font-size: 24px;
    }
    
    .app-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .app-button:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateX(5px);
    }
    
    .app-icon {
      font-size: 32px;
      margin-right: 15px;
    }
    
    .app-info {
      flex: 1;
    }
    
    .app-name {
      font-weight: bold;
      font-size: 18px;
      color: #333;
      margin-bottom: 4px;
    }
    
    .app-desc {
      font-size: 13px;
      color: #666;
    }
    
    .app-arrow {
      font-size: 24px;
      color: #667eea;
    }
    
    .launch-all {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      margin-top: 25px;
      padding: 18px;
      font-size: 16px;
    }
    
    .launch-all:hover {
      box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
    }
    
    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .server-status {
      text-align: center;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }
    
    .server-status.online {
      background: #d4edda;
      color: #155724;
    }
    
    .server-status.offline {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Form -->
    <div id="loginForm">
      <div class="logo">
        <div class="logo-circle">N</div>
        <h1>NASHTY OS</h1>
        <p class="subtitle">Point of Sale System</p>
      </div>
      
      <div class="server-status" id="serverStatus">
        Checking server...
      </div>
      
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" value="admin" autocomplete="username" />
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" value="admin" autocomplete="current-password" />
      </div>
      
      <button onclick="login()" id="loginBtn">
        Login
      </button>
      
      <div class="error" id="error"></div>
      <div class="success" id="success"></div>
    </div>

    <!-- Apps Menu -->
    <div id="appsMenu" class="apps">
      <h2>🚀 Pilih Sistem</h2>
      
      <div class="app-button" onclick="openApp('pos')">
        <div class="app-icon">🛒</div>
        <div class="app-info">
          <div class="app-name">POS Terminal</div>
          <div class="app-desc">Point of Sale untuk kasir</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
      
      <div class="app-button" onclick="openApp('kds')">
        <div class="app-icon">👨‍🍳</div>
        <div class="app-info">
          <div class="app-name">Kitchen Display</div>
          <div class="app-desc">KDS untuk dapur</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
      
      <div class="app-button" onclick="openApp('backoffice')">
        <div class="app-icon">📊</div>
        <div class="app-info">
          <div class="app-name">Backoffice Dashboard</div>
          <div class="app-desc">Management & reporting</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
      
      <div class="app-button" onclick="openApp('crm')">
        <div class="app-icon">👥</div>
        <div class="app-info">
          <div class="app-name">CRM / Members</div>
          <div class="app-desc">Customer Relationship Management</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
      
      <div class="app-button" onclick="openApp('cost')">
        <div class="app-icon">💰</div>
        <div class="app-info">
          <div class="app-name">Cost Management</div>
          <div class="app-desc">Food Cost & Recipes</div>
        </div>
        <div class="app-arrow">→</div>
      </div>
      
      <button class="launch-all" onclick="openAll()">
        🚀 Buka Semua (Testing Mode)
      </button>
      
      <button onclick="logout()" style="background: #95a5a6; margin-top: 15px;">
        ← Logout
      </button>
    </div>
  </div>

  <script>
    let jwtToken = '';
    const API_BASE = 'http://localhost:3099/api';

    // Check server health on load
    async function checkServer() {
      const statusDiv = document.getElementById('serverStatus');
      try {
        const response = await fetch(`${API_BASE}/health`);
        const data = await response.json();
        
        if (data.status === 'healthy') {
          statusDiv.className = 'server-status online';
          statusDiv.textContent = '✓ Server Online (Port 3099)';
        } else {
          statusDiv.className = 'server-status offline';
          statusDiv.textContent = '⚠ Server Unhealthy';
        }
      } catch (error) {
        statusDiv.className = 'server-status offline';
        statusDiv.textContent = '✗ Server Offline - Run start-local.ps1';
      }
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      const loginBtn = document.getElementById('loginBtn');

      errorDiv.className = 'error';
      successDiv.className = 'success';
      errorDiv.textContent = '';
      successDiv.textContent = '';

      if (!username || !password) {
        errorDiv.textContent = 'Username dan password harus diisi';
        errorDiv.className = 'error show';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loader"></span> Logging in...';

      try {
        const response = await fetch(`${API_BASE}/main/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success && data.token) {
          jwtToken = data.token;
          localStorage.setItem('nashty_main_token', jwtToken);
          localStorage.setItem('nashty_session_data', JSON.stringify(data.session));
          
          successDiv.textContent = '✓ Login berhasil!';
          successDiv.className = 'success show';
          
          // Transition to apps menu
          setTimeout(() => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('appsMenu').className = 'apps show';
          }, 500);
        } else {
          errorDiv.textContent = data.error || 'Login gagal';
          errorDiv.className = 'error show';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      } catch (error) {
        errorDiv.textContent = 'Error: ' + error.message + ' - Pastikan server running!';
        errorDiv.className = 'error show';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    function openApp(appName) {
      const urls = {
        pos: '/pos/frontend/index.html',
        kds: '/kds/frontend/index.html',
        backoffice: '/backoffice/frontend/index.html',
        crm: '/crm/index.html',
        cost: '/cost/index.html'
      };
      
      const url = urls[appName] + '?token=' + jwtToken;
      window.open(url, '_blank', 'width=1400,height=900');
    }

    function openAll() {
      openApp('pos');
      setTimeout(() => openApp('kds'), 300);
      setTimeout(() => openApp('backoffice'), 600);
      setTimeout(() => openApp('crm'), 900);
      setTimeout(() => openApp('cost'), 1200);
    }

    function logout() {
      localStorage.removeItem('nashty_main_token');
      localStorage.removeItem('nashty_session_data');
      document.getElementById('appsMenu').className = 'apps';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('loginBtn').textContent = 'Login';
    }

    // Enter key to login
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    // Check server on load
    checkServer();
  </script>
</body>
</html>
