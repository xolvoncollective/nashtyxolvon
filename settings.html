<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASHTY OS | Settings</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg-base: #010100;
      --bg-surface: #0A0A09;
      --bg-input: #121210;
      --border-dim: #2A2A26;
      --border-focus: #E4540C;
      --accent: #E4540C;
      --accent-hover: #C4420A;
      --text-main: #FAFAFA;
      --text-muted: #82827C;
      --success: #10B981;
      --danger: #EF4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-base);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-dim);
    }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2rem;
      color: var(--accent);
    }

    .subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .btn {
      background: var(--accent);
      color: var(--bg-base);
      border: none;
      padding: 0.75rem 1.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-main);
      border: 1px solid var(--border-dim);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
    }

    .section {
      background: var(--bg-surface);
      border: 1px solid var(--border-dim);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .table-card {
      background: var(--bg-input);
      border: 1px solid var(--border-dim);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .table-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .table-name {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .table-count {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-dim);
      color: var(--text-main);
      padding: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--border-focus);
    }

    .alert {
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 3px solid;
      font-size: 0.9rem;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border-color: var(--success);
      color: var(--success);
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border-color: var(--danger);
      color: var(--danger);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>⚙️ SETTINGS</h1>
        <div class="subtitle" id="userInfo">Loading user info...</div>
      </div>
      <button class="btn-secondary" onclick="window.close()">Close Window</button>
    </div>

    <div id="alerts"></div>

    <!-- Account Management Section -->
    <div class="section">
      <div class="section-title">👤 Account Management</div>
      
      <div class="form-group">
        <label>Current Username</label>
        <input type="text" id="currentUsername" readonly>
      </div>

      <div class="form-group">
        <label>New Username (Optional)</label>
        <input type="text" id="newUsername" placeholder="Leave blank to keep current">
      </div>

      <div class="form-group">
        <label>New Password (Optional)</label>
        <input type="password" id="newPassword" placeholder="Leave blank to keep current">
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Required if changing password">
      </div>

      <button class="btn" onclick="updateAccount()">Update Account</button>
    </div>

    <!-- Supabase Tables Section -->
    <div class="section">
      <div class="section-title">🗄️ Supabase Database Tables</div>
      <div id="tablesGrid" class="grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
          <div class="loading" style="margin: 0 auto;"></div>
          <p style="margin-top: 1rem; color: var(--text-muted);">Loading tables...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/api-client.js"></script>
  <script>
    const SUPABASE_URL = 'https://mzucfndifneytbesirkx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16dWNmbmRpZm5leXRiZXNpcmt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDA1MzUsImV4cCI6MjA5NjkxNjUzNX0.fUynF1mfZCyy48aFkwz3_G52-4hd4EE-b5gpG7k0mpg';

    const tables = [
      'users', 'outlets', 'tenants', 'products', 'categories', 
      'orders', 'order_items', 'shifts', 'activity_logs',
      'modifier_groups', 'modifier_options', 'product_modifiers',
      'favorites', 'outlet_settings', 'analytics_cache',
      'token_blacklist', 'costs', 'customers', 'members'
    ];

    let currentUser = null;

    async function init() {
      // Get session from parent window or localStorage
      const session = JSON.parse(localStorage.getItem('nashty_main_session') || '{}');
      
      if (!session.user) {
        alert('⚠️ No session found. Please login first.');
        window.close();
        return;
      }

      currentUser = session.user;
      document.getElementById('userInfo').textContent = `Logged in as: ${currentUser.username}`;
      document.getElementById('currentUsername').value = currentUser.username;

      // Load tables
      await loadTables();
    }

    async function loadTables() {
      const grid = document.getElementById('tablesGrid');
      grid.innerHTML = '';

      for (const table of tables) {
        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=count`, {
            method: 'HEAD',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
              'Prefer': 'count=exact'
            }
          });

          const count = response.headers.get('content-range')?.split('/')[1] || '?';

          const card = document.createElement('div');
          card.className = 'table-card';
          card.onclick = () => openTable(table);
          card.innerHTML = `
            <div class="table-name">${table}</div>
            <div class="table-count">${count} rows</div>
          `;
          grid.appendChild(card);
        } catch (error) {
          console.error(`Failed to load ${table}:`, error);
        }
      }
    }

    function openTable(tableName) {
      // Open Supabase table editor in new tab
      window.open(`https://supabase.com/dashboard/project/mzucfndifneytbesirkx/editor/${tableName}`, '_blank');
    }

    async function updateAccount() {
      const newUsername = document.getElementById('newUsername').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate
      if (newPassword && newPassword !== confirmPassword) {
        showAlert('Passwords do not match!', 'error');
        return;
      }

      if (!newUsername && !newPassword) {
        showAlert('Please enter new username or password', 'error');
        return;
      }

      try {
        const updates = {};
        if (newUsername) updates.username = newUsername;
        if (newPassword) updates.password = newPassword;

        // Update via API
        const response = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${currentUser.id}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=representation'
          },
          body: JSON.stringify(updates)
        });

        if (!response.ok) throw new Error('Failed to update account');

        const updated = await response.json();
        
        showAlert('✅ Account updated successfully!', 'success');
        
        // Update local data
        if (newUsername) {
          currentUser.username = newUsername;
          document.getElementById('currentUsername').value = newUsername;
          document.getElementById('userInfo').textContent = `Logged in as: ${newUsername}`;
          
          // Update session
          const session = JSON.parse(localStorage.getItem('nashty_main_session') || '{}');
          session.user.username = newUsername;
          localStorage.setItem('nashty_main_session', JSON.stringify(session));
        }

        // Clear inputs
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';

      } catch (error) {
        console.error('Update failed:', error);
        showAlert('❌ Failed to update account: ' + error.message, 'error');
      }
    }

    function showAlert(message, type) {
      const alerts = document.getElementById('alerts');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      alerts.appendChild(alert);

      setTimeout(() => alert.remove(), 5000);
    }

    // Initialize on load
    window.addEventListener('load', init);
  </script>
</body>
</html>
