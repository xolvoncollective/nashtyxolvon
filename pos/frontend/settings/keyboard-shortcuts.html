<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Shortcuts - NASHTY OS</title>
  <link rel="stylesheet" href="../css/app.css">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #0B0F19; color: #F8FAFC; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { margin-bottom: 30px; }
    h1 { font-size: 28px; font-weight: 900; color: #FF5A1F; }
    .shortcut-list { display: flex; flex-direction: column; gap: 12px; }
    .shortcut-item { background: rgba(21, 29, 45, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    .shortcut-name { font-size: 14px; font-weight: 600; color: #F8FAFC; }
    .shortcut-desc { font-size: 12px; color: #94A3B8; margin-top: 4px; }
    .shortcut-key { background: rgba(255, 90, 31, 0.15); border: 1px solid rgba(255, 90, 31, 0.35); border-radius: 8px; padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: #FF5A1F; cursor: pointer; transition: all 0.2s; }
    .shortcut-key:hover { background: rgba(255, 90, 31, 0.25); transform: scale(1.05); }
    .btn-reset { background: #FF5A1F; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    .btn-reset:hover { background: #E04812; }
    .capture-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; }
    .capture-modal.show { display: flex; }
    .capture-box { background: rgba(21, 29, 45, 0.95); border: 2px solid #FF5A1F; border-radius: 16px; padding: 40px; text-align: center; }
    .capture-box h2 { font-size: 20px; margin-bottom: 12px; }
    .capture-box p { color: #94A3B8; font-size: 14px; margin-bottom: 20px; }
    .captured-key { background: rgba(255, 90, 31, 0.25); border: 2px solid #FF5A1F; padding: 16px 32px; border-radius: 10px; font-size: 24px; font-weight: 900; color: #FF5A1F; min-width: 200px; }
    .conflict-warning { background: rgba(244, 63, 94, 0.15); border: 1px solid #F43F5E; border-radius: 8px; padding: 12px; margin-top: 12px; color: #F43F5E; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⌨️ Keyboard Shortcuts Settings</h1>
      <p style="color: #94A3B8; margin-top: 8px;">Customize your keyboard shortcuts for faster POS operations</p>
    </div>

    <div class="shortcut-list" id="shortcutList"></div>

    <button class="btn-reset" onclick="resetToDefaults()">🔄 Reset to Defaults</button>
  </div>

  <div class="capture-modal" id="captureModal">
    <div class="capture-box">
      <h2>Press any key combination</h2>
      <p>Press the keys you want to assign to this action</p>
      <div class="captured-key" id="capturedKey">Waiting...</div>
      <div class="conflict-warning" id="conflictWarning" style="display: none;">
        ⚠️ This shortcut is already assigned to another action
      </div>
      <button class="btn-reset" onclick="cancelCapture()" style="margin-top: 20px; background: #6B7280;">Cancel</button>
    </div>
  </div>

  <script>
    const DEFAULT_SHORTCUTS = {
      'payment': { name: 'Open Payment', key: 'Ctrl+P', desc: 'Open payment dialog' },
      'save-draft': { name: 'Save Draft', key: 'Ctrl+S', desc: 'Save current cart as draft' },
      'new-order': { name: 'New Order', key: 'Ctrl+N', desc: 'Clear cart and start new order' },
      'drafts': { name: 'Show Drafts', key: 'Ctrl+D', desc: 'Show saved draft orders' },
      'history': { name: 'Order History', key: 'Ctrl+H', desc: 'Open order history' },
      'search': { name: 'Focus Search', key: 'Alt+F', desc: 'Focus product search input' },
      'cancel': { name: 'Cancel/Close', key: 'Escape', desc: 'Close dialog or cancel operation' }
    };

    let currentShortcuts = {};
    let currentEditing = null;

    async function loadShortcuts() {
      const db = await openDB();
      const tx = db.transaction('keyboard_shortcuts', 'readonly');
      const store = tx.objectStore('keyboard_shortcuts');
      const saved = await store.get('user_shortcuts');
      currentShortcuts = saved ? saved.shortcuts : {...DEFAULT_SHORTCUTS};
      renderShortcuts();
    }

    function renderShortcuts() {
      const list = document.getElementById('shortcutList');
      list.innerHTML = '';
      
      Object.entries(currentShortcuts).forEach(([id, shortcut]) => {
        const item = document.createElement('div');
        item.className = 'shortcut-item';
        item.innerHTML = `
          <div>
            <div class="shortcut-name">${shortcut.name}</div>
            <div class="shortcut-desc">${shortcut.desc}</div>
          </div>
          <div class="shortcut-key" onclick="editShortcut('${id}')">${shortcut.key}</div>
        `;
        list.appendChild(item);
      });
    }

    function editShortcut(id) {
      currentEditing = id;
      document.getElementById('captureModal').classList.add('show');
      document.getElementById('capturedKey').textContent = 'Waiting...';
      document.getElementById('conflictWarning').style.display = 'none';
    }

    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('captureModal').classList.contains('show')) return;
      
      e.preventDefault();
      const keys = [];
      if (e.ctrlKey) keys.push('Ctrl');
      if (e.altKey) keys.push('Alt');
      if (e.shiftKey) keys.push('Shift');
      if (e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Shift') {
        keys.push(e.key.toUpperCase());
      }
      
      const combo = keys.join('+');
      document.getElementById('capturedKey').textContent = combo;

      // Check for conflicts
      const conflict = Object.entries(currentShortcuts).find(([id, s]) => 
        s.key === combo && id !== currentEditing
      );
      
      if (conflict) {
        document.getElementById('conflictWarning').style.display = 'block';
        document.getElementById('conflictWarning').textContent = 
          `⚠️ Already assigned to: ${conflict[1].name}`;
      } else {
        document.getElementById('conflictWarning').style.display = 'none';
        // Apply immediately
        setTimeout(() => applyShortcut(combo), 500);
      }
    });

    async function applyShortcut(combo) {
      if (currentEditing) {
        currentShortcuts[currentEditing].key = combo;
        await saveShortcuts();
        cancelCapture();
        renderShortcuts();
      }
    }

    function cancelCapture() {
      document.getElementById('captureModal').classList.remove('show');
      currentEditing = null;
    }

    async function resetToDefaults() {
      if (confirm('Reset all shortcuts to default values?')) {
        currentShortcuts = {...DEFAULT_SHORTCUTS};
        await saveShortcuts();
        renderShortcuts();
      }
    }

    async function saveShortcuts() {
      const db = await openDB();
      const tx = db.transaction('keyboard_shortcuts', 'readwrite');
      await tx.objectStore('keyboard_shortcuts').put({
        id: 'user_shortcuts',
        shortcuts: currentShortcuts,
        updatedAt: Date.now()
      });
    }

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('POS_DB', 1);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    loadShortcuts();
  </script>
</body>
</html>
