<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Display - Nashty POS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      color: #000000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #outlet-logo {
      max-width: 200px;
      max-height: 80px;
      margin: 20px auto;
      display: block;
    }

    #display-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      font-size: 24pt;
    }

    .idle-screen {
      text-align: center;
    }

    .idle-logo {
      max-width: 300px;
      margin-bottom: 30px;
    }

    .idle-tagline {
      font-size: 36pt;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .cart-view {
      width: 100%;
      max-width: 800px;
    }

    .items-list {
      max-height: 60vh;
      overflow-y: auto;
      margin-bottom: 30px;
    }

    .display-item {
      padding: 20px;
      border-bottom: 2px solid #e0e0e0;
    }

    .item-name {
      font-size: 28pt;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .item-details {
      display: flex;
      justify-content: space-between;
      font-size: 24pt;
      color: #666;
    }

    .cart-totals {
      border-top: 4px solid #333;
      padding-top: 20px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 28pt;
      margin: 15px 0;
    }

    .grand-total {
      font-size: 36pt;
      font-weight: bold;
      color: #4CAF50;
      border-top: 2px solid #333;
      padding-top: 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <img id="outlet-logo" src="/logo.png" alt="Logo" />
  <div id="display-content">
    <div class="idle-screen">
      <img src="/logo.png" class="idle-logo" />
      <div class="idle-tagline">Selamat Datang!</div>
    </div>
  </div>

  <script>
    // Listen for cart updates from main window
    window.addEventListener('message', (event) => {
      if (event.data.type === 'cart-update') {
        updateCart(event.data.cart);
      }
    });

    function updateCart(cart) {
      const container = document.getElementById('display-content');
      
      if (!cart || cart.items.length === 0) {
        showIdleScreen();
        return;
      }

      const itemsHtml = cart.items.map(item => `
        <div class="display-item">
          <div class="item-name">${item.name}</div>
          <div class="item-details">
            <span>${item.quantity}x</span>
            <span>Rp ${item.price.toLocaleString()}</span>
            <span>Rp ${(item.price * item.quantity).toLocaleString()}</span>
          </div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="cart-view">
          <div class="items-list">${itemsHtml}</div>
          <div class="cart-totals">
            <div class="total-row">
              <span>Subtotal:</span>
              <span>Rp ${cart.subtotal.toLocaleString()}</span>
            </div>
            <div class="total-row grand-total">
              <span>TOTAL:</span>
              <span>Rp ${cart.total.toLocaleString()}</span>
            </div>
          </div>
        </div>
      `;
    }

    function showIdleScreen() {
      const container = document.getElementById('display-content');
      container.innerHTML = `
        <div class="idle-screen">
          <img src="/logo.png" class="idle-logo" />
          <div class="idle-tagline">Selamat Datang!</div>
        </div>
      `;
    }
  </script>
</body>
</html>
